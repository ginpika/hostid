services:
  frontend:
    image: ghcr.io/ginpika/hostid-frontend:latest
    container_name: hostid-frontend
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - ./frontend.env
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/ginpika/hostid-backend:latest
    container_name: hostid-backend
    ports:
      - "${SMTP_PORT:-25}:25"
      - "${PORT:-3001}:3001"
    env_file:
      - ./backend.env
    environment:
      - DATABASE_URL=file:/app/data/prod.db
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    restart: unless-stopped

volumes:
  backend_data:
  backend_uploads:
  backend_logs:
