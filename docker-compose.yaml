services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - CF_TURNSTILE_SITE_KEY
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${SMTP_PORT:-25}:25"
      - "${PORT:-3001}:3001"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=file:/app/data/prod.db
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      - backend_avatars:/app/avatars
    restart: unless-stopped

volumes:
  backend_data:
  backend_uploads:
  backend_logs:
  backend_avatars:
