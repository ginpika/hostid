services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - CF_TURNSTILE_SITE_KEY
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${SMTP_PORT:-25}:25"
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/app/data/prod.db
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    restart: unless-stopped

volumes:
  backend_data:
  backend_uploads:
  backend_logs:
